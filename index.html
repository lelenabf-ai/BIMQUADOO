<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadoo · BIM · Infográfico Interativo</title>
<style>
  :root{
    --pink:#D6006D; --cyan:#16B9C6; --ink:#000;
    --ease:cubic-bezier(.65,.02,.18,1);
    --dur:.62s;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--ink);overflow:hidden;
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif;}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    perspective:1400px;}

  /* ---------- MENU ---------- */
  #menu{position:absolute;height:92vh;max-width:96vw;aspect-ratio:693/1055;
    transition:transform var(--dur) var(--ease),opacity var(--dur) var(--ease);
    will-change:transform,opacity;}
  #menu img{width:100%;height:100%;display:block;user-select:none;-webkit-user-drag:none;}
  .hot{position:absolute;transform:translate(-50%,-50%);width:13.5%;aspect-ratio:1;
    border-radius:50%;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease, background .18s ease;}
  .hot:hover{transform:translate(-50%,-50%) scale(1.12);
    box-shadow:0 0 0 3px rgba(255,255,255,.55), 0 0 26px rgba(255,255,255,.25);
    background:rgba(255,255,255,.06);}
  .hot:active{transform:translate(-50%,-50%) scale(.97);}
  #bimHot{position:absolute;left:49.8%;top:58.3%;transform:translate(-50%,-50%);
    width:46%;height:20%;cursor:pointer;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
    transition:background .18s ease;}
  #bimHot:hover{background:rgba(214,0,109,.10);}
  #bimHot:active{background:rgba(214,0,109,.18);}
  #bimHot::after{content:"o que é BIM?";position:absolute;inset:0;display:flex;
    align-items:center;justify-content:center;color:var(--pink);font-weight:700;
    font-size:clamp(12px,1.7vh,22px);letter-spacing:.5px;opacity:0;transition:opacity .2s;}
  #bimHot:hover::after{opacity:1;}

  /* ---------- SLIDE ---------- */
  #slideWrap{position:absolute;width:100%;height:100%;display:flex;align-items:center;
    justify-content:center;opacity:0;pointer-events:none;
    transition:transform var(--dur) var(--ease),opacity var(--dur) var(--ease);
    will-change:transform,opacity;}
  #slideInner{width:82vw;max-width:1150px;position:relative;}
  #slideInner img{width:100%;display:block;-webkit-user-drag:none;user-select:none;}
  /* return hotspot over the in-banner quadoo logo */
  .retZone{position:absolute;top:0;height:100%;width:13%;cursor:pointer;}
  .retZone.right{right:0;} .retZone.left{left:0;}
  .retZone:hover{background:radial-gradient(circle at center,rgba(255,255,255,.10),transparent 70%);}

  .leftOut{transform:translateX(-128%) rotateY(8deg);opacity:0;}
  .rightOut{transform:translateX(128%) rotateY(-8deg);opacity:0;}

  /* legenda da página inicial (alinhada à borda esquerda do infográfico) */
  #menuNote{position:fixed;left:max(22px, calc(50vw - 30vh));bottom:20px;z-index:20;
    color:#cfcfcf;font-size:13px;line-height:1.45;letter-spacing:.3px;pointer-events:none;
    transition:opacity .35s ease;}
  #menuNote b{color:var(--pink);font-weight:700;}
  #menuNote.hide{opacity:0;}
</style>
</head>
<body>
  <div id="stage">
    <div id="menu">
      <img id="menuImg">
      <!-- hotspots injected by JS -->
    </div>
    <div id="slideWrap"><div id="slideInner"></div></div>
  </div>

  <div id="menuNote">Para retornar ao menu<br>clique no ícone da <b>quadoo</b></div>

document.getElementById('menuImg').src = IMG.menu;

// menu number positions (center %, relative to menu image)
const HOTS = [
  {n:'01', x:29.6, y:72.5}, {n:'02', x:13.7, y:65.9}, {n:'03', x:14.4, y:51.7},
  {n:'04', x:30.3, y:44.5}, {n:'05', x:49.8, y:40.3}, {n:'06', x:70.7, y:44.5},
  {n:'07', x:85.9, y:51.7}, {n:'08', x:85.9, y:65.4}, {n:'09', x:70.7, y:72.0},
  {n:'10', x:49.8, y:78.2}, {n:'11', x:74.3, y:88.2},
];

// each menu number -> its art (key) + which side the in-banner quadoo logo sits on
const SLIDES = {
  '01':{img:'s01',side:'right'}, '02':{img:'s02',side:'right'}, '03':{img:'s03',side:'right'},
  '04':{img:'s04',side:'right'}, '05':{img:'s05',side:'right'}, '06':{img:'s06',side:'left'},
  '07':{img:'s07',side:'left'},  '08':{img:'s08',side:'left'},  '09':{img:'s09',side:'left'},
  '10':{img:'s10',side:'left'},  '11':{img:'s11',side:'left'},
};

const menu = document.getElementById('menu');
const wrap = document.getElementById('slideWrap');
const inner = document.getElementById('slideInner');
const note = document.getElementById('menuNote');
let lastDir = 'right';

// build number hotspots
HOTS.forEach(h=>{
  const d=document.createElement('div');
  d.className='hot'; d.style.left=h.x+'%'; d.style.top=h.y+'%';
  d.title='Item '+h.n;
  d.onclick=()=>openSlide(h.n);
  menu.appendChild(d);
});

// build center BIM hotspot
const bim=document.createElement('div');
bim.id='bimHot';
bim.onclick=()=>openBIM();
menu.appendChild(bim);

function buildSlide(key){
  inner.innerHTML='';
  inner.style.width='';
  const s=SLIDES[key];
  const img=document.createElement('img'); img.src=IMG[s.img]; inner.appendChild(img);
  const r=document.createElement('div'); r.className='retZone '+s.side; r.title='Voltar ao menu';
  r.onclick=showMenu; inner.appendChild(r);
}

function buildBIM(){
  inner.innerHTML='';
  inner.style.width='min(60vh,420px)';
  const img=document.createElement('img'); img.src=IMG.bim; inner.appendChild(img);
  // logo of the BIM page sits bottom-right
  const r=document.createElement('div'); r.className='retZone right';
  r.style.cssText='right:0;bottom:0;top:auto;height:22%;width:55%;'; r.title='Voltar ao menu';
  r.onclick=showMenu; inner.appendChild(r);
}

function slideIn(dir){
  note.classList.add('hide');
  wrap.style.transition='none';
  wrap.style.transform = (dir==='right') ? 'translateX(-128%)' : 'translateX(128%)';
  wrap.style.opacity='0';
  void wrap.offsetWidth; // force reflow
  menu.classList.add(dir==='right' ? 'rightOut' : 'leftOut');
  wrap.style.transition='';
  wrap.style.transform='translateX(0)';
  wrap.style.opacity='1';
  wrap.style.pointerEvents='auto';
}

function openSlide(n){
  const dir = (parseInt(n,10)>=1 && parseInt(n,10)<=5) ? 'right' : 'left';
  lastDir = dir;
  buildSlide(n);
  slideIn(dir);
}

function openBIM(){
  lastDir = 'right';
  buildBIM();
  slideIn('right');
}

function showMenu(){
  note.classList.remove('hide');
  wrap.style.transform = (lastDir==='right') ? 'translateX(-128%)' : 'translateX(128%)';
  wrap.style.opacity='0';
  wrap.style.pointerEvents='none';
  menu.classList.remove('rightOut','leftOut');
}
</script>
